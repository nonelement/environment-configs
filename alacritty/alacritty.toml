[font]
  size = 18

[font.normal]
  family = "FiraCode Nerd Font Mono"
  style = "Regular"

[window]
  padding = { x = 0, y = 0 }
  resize_increments = true


# Colors (Everforest Dark)
# https://github.com/alacritty/alacritty-theme/blob/master/themes/everforest_dark.toml

# Default colors
[colors.primary]
background = '#182027'
foreground = '#d3c6aa'

# Normal colors
[colors.normal]
#black   = '#475258' # too bright for normal black
#black   = '#2e363b' # optional intermediate value
black   = '#182027' # same as background color
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

# Bright colors
[colors.bright]
black   = '#475258'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'
